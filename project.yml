name: TagYourCar
options:
  bundleIdPrefix: com.tagyourcar
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  TagYourCar:
    type: application
    platform: iOS
    sources:
      - TagYourCar
    info:
      path: TagYourCar/Resources/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.71145584282-aqt95t49louvmnurlq430ce8ajqop4q5
        FirebaseAppDelegateProxyEnabled: false
        UILaunchStoryboardName: LaunchScreen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tagyourcar.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: K22558HU63
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: TagYourCar
        SWIFT_STRICT_CONCURRENCY: targeted
        CODE_SIGN_ENTITLEMENTS: TagYourCar/TagYourCar.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFunctions
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn

  TagYourCarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TagYourCarTests
    dependencies:
      - target: TagYourCar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tagyourcar.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  TagYourCar:
    build:
      targets:
        TagYourCar: all
        TagYourCarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: TagYourCarTests
    analyze:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
